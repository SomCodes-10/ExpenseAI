<svg width="680" height="240" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SpendWise logo</title>
<desc>Wordmark logo for SpendWise, a teal coin icon followed by the text SpendWise</desc>
<defs>
<linearGradient id="tealg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#0f766e"/>
<stop offset="1" stop-color="#14b8a6"/>
</linearGradient>
</defs>
<circle cx="120" cy="120" r="70" fill="url(#tealg)"/>
<text x="120" y="135" text-anchor="middle" font-size="52" font-weight="500" fill="#ffffff" font-family="Arial, sans-serif">$</text>
<text x="220" y="140" font-size="56" font-weight="500" fill="#0f766e" font-family="Arial, sans-serif">Spend<tspan fill="#14b8a6">Wise</tspan></text>
</svg>